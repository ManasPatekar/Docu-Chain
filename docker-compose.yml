version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: docuchain-backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ROOT_USER=docuchain_admin
      - MINIO_ROOT_PASSWORD=docuchain_enterprise_secret!
      - VT_API_KEY=${VT_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
    depends_on:
      - minio

  minio:
    image: minio/minio
    container_name: docuchain-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=docuchain_admin
      - MINIO_ROOT_PASSWORD=docuchain_enterprise_secret!
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  minio_data:
