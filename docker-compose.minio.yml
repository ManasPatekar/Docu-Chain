version: '3.8'

services:
  minio:
    image: minio/minio:latest
    container_name: docuchain-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=docuchain_admin
      - MINIO_ROOT_PASSWORD=docuchain_enterprise_secret!
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  minio_data:
